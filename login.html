<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .login-container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
      }

      .login-container h1 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
        font-size: 28px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: 500;
        font-size: 14px;
      }

      .form-group input[type="email"],
      .form-group input[type="password"] {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 5px;
        font-size: 15px;
        transition: border-color 0.3s;
      }

      .form-group input[type="email"]:focus,
      .form-group input[type="password"]:focus {
        outline: none;
        border-color: #667eea;
      }

      .remember-me {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
      }

      .remember-me input[type="checkbox"] {
        margin-right: 8px;
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .remember-me label {
        margin: 0;
        color: #555;
        font-size: 14px;
        cursor: pointer;
        font-weight: normal;
      }

      .login-btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      .login-btn:active {
        transform: translateY(0);
      }

      .error-message {
        color: #e74c3c;
        font-size: 14px;
        margin-top: 5px;
        display: none;
      }

      .success-message {
        color: #27ae60;
        font-size: 14px;
        margin-top: 5px;
        display: none;
      }

      .footer-text {
        text-align: center;
        margin-top: 20px;
        color: #777;
        font-size: 14px;
      }

      .footer-text a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
      }

      .footer-text a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h1>Login</h1>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
          <div class="error-message" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
          />
          <div class="error-message" id="passwordError"></div>
        </div>

        <div class="remember-me">
          <input type="checkbox" id="rememberMe" name="rememberMe" />
          <label for="rememberMe">Remember me</label>
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div class="success-message" id="successMessage">Login successful!</div>
      </form>

      <div class="footer-text">
        Don't have an account? <a href="#">Sign up</a>
      </div>
    </div>

    <script>
      const loginForm = document.getElementById("loginForm");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const rememberMeCheckbox = document.getElementById("rememberMe");
      const emailError = document.getElementById("emailError");
      const passwordError = document.getElementById("passwordError");
      const successMessage = document.getElementById("successMessage");

      // Load saved email and remember me state if exists
      window.addEventListener("load", () => {
        const savedEmail = localStorage.getItem("savedEmail");
        const rememberMe = localStorage.getItem("rememberMe") === "true";

        if (savedEmail && rememberMe) {
          emailInput.value = savedEmail;
          rememberMeCheckbox.checked = true;
        }
      });

      // Handle form submission
      loginForm.addEventListener("submit", (e) => {
        e.preventDefault();

        // Clear previous error messages
        emailError.textContent = "";
        passwordError.textContent = "";
        emailError.style.display = "none";
        passwordError.style.display = "none";
        successMessage.style.display = "none";

        // Validate email
        const email = emailInput.value.trim();
        if (!email) {
          emailError.textContent = "Email is required";
          emailError.style.display = "block";
          return;
        }

        if (!isValidEmail(email)) {
          emailError.textContent = "Please enter a valid email";
          emailError.style.display = "block";
          return;
        }

        // Validate password
        const password = passwordInput.value;
        if (!password) {
          passwordError.textContent = "Password is required";
          passwordError.style.display = "block";
          return;
        }

        if (password.length < 6) {
          passwordError.textContent = "Password must be at least 6 characters";
          passwordError.style.display = "block";
          return;
        }

        // Save email and remember me preference if checked
        if (rememberMeCheckbox.checked) {
          localStorage.setItem("savedEmail", email);
          localStorage.setItem("rememberMe", "true");
        } else {
          localStorage.removeItem("savedEmail");
          localStorage.removeItem("rememberMe");
        }

        // Display success message (in real app, you'd send to server)
        successMessage.style.display = "block";
        console.log("Login attempt:", {
          email,
          password,
          rememberMe: rememberMeCheckbox.checked,
        });

        // Reset form after 2 seconds
        setTimeout(() => {
          loginForm.reset();
          successMessage.style.display = "none";
        }, 2000);
      });

      // Validate email format
      function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
      }

      // Clear error on input
      emailInput.addEventListener("input", () => {
        emailError.style.display = "none";
      });

      passwordInput.addEventListener("input", () => {
        passwordError.style.display = "none";
      });
    </script>
  </body>
</html>
